<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">

<title>Tasbih Digital · Asmaul Husna</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  body {
    background: linear-gradient(160deg, #0a3d3a 0%, #126e5e 50%, #1a8c75 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
    min-height: 100vh;
  }

  /* Top bar */
  .topbar {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 4px 12px;
  }
  .title { font-size: 18px; font-weight: 600; opacity: 0.9; letter-spacing: 0.5px; }
  .menu-btn {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    width: 40px; height: 40px;
    border-radius: 12px;
    font-size: 20px;
    cursor: pointer;
  }

  /* Mode toggle */
  .modes {
    width: 100%;
    max-width: 480px;
    display: flex;
    background: rgba(0,0,0,0.18);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 14px;
  }
  .mode {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s;
    color: rgba(255,255,255,0.7);
    font-weight: 500;
  }
  .mode.active {
    background: linear-gradient(135deg, #d4af37, #c89730);
    color: #1a3d2a;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  /* Asmaul Husna card */
  .name-card {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 20px 18px;
    margin-bottom: 18px;
    text-align: center;
    backdrop-filter: blur(8px);
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .name-index {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .name-arabic {
    font-size: 38px;
    font-family: 'Traditional Arabic', 'Amiri', 'Scheherazade', serif;
    line-height: 1.4;
    margin-bottom: 6px;
    color: #ffd95a;
    direction: rtl;
  }
  .name-translit {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #fff;
  }
  .name-meaning {
    font-size: 14px;
    opacity: 0.85;
    font-style: italic;
  }

  /* Counter */
  .counter-display {
    font-size: 96px;
    font-weight: 200;
    text-align: center;
    line-height: 1;
    margin: 10px 0 18px;
    color: #fff;
    text-shadow: 0 4px 24px rgba(0,0,0,0.3);
    letter-spacing: -3px;
  }
  .counter-wrap {
    width: 100%;
    max-width: 480px;
    position: relative;
  }
  .target-celebration {
    position: absolute;
    inset: -26px 0 auto;
    min-height: 148px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transform: translateY(12px) scale(0.96);
    transition: opacity 0.22s ease, transform 0.22s ease;
    z-index: 5;
  }
  .target-celebration.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .target-celebration-main {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 18px;
    padding: 10px 18px 12px;
    background: rgba(6, 36, 31, 0.82);
    border: 1px solid rgba(255, 217, 90, 0.55);
    box-shadow: 0 14px 34px rgba(0,0,0,0.36);
    color: #ffd95a;
    font-size: 44px;
    font-weight: 900;
    line-height: 1.05;
    text-shadow: 0 2px 12px rgba(0,0,0,0.45);
  }
  .target-celebration-sub {
    max-width: min(92vw, 430px);
    border-radius: 16px;
    padding: 9px 16px;
    background: rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.92);
    font-size: 22px;
    font-weight: 800;
    line-height: 1.18;
  }
  .target-info {
    font-size: 13px;
    opacity: 0.6;
    text-align: center;
    margin-top: -10px;
    margin-bottom: 18px;
  }
  .target-settings {
    width: 100%;
    max-width: 480px;
    display: grid;
    grid-template-columns: 1fr 112px;
    gap: 10px;
    margin: -4px 0 14px;
  }
  .target-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: rgba(0,0,0,0.18);
    border-radius: 12px;
    padding: 4px;
  }
  .target-mode {
    border: 0;
    border-radius: 9px;
    background: transparent;
    color: rgba(255,255,255,0.72);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 8px;
    cursor: pointer;
  }
  .target-mode.active {
    background: rgba(255,255,255,0.16);
    color: #ffd95a;
  }
  .target-input {
    width: 100%;
    min-width: 0;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 12px;
    padding: 0 12px;
    text-align: center;
    font-size: 18px;
    font-weight: 800;
    outline: none;
  }
  .target-input:disabled {
    opacity: 0.4;
  }

  /* Tap bead */
  .bead-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 480px;
    margin: 8px 0;
  }
  .bead {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 32%, #ffe27a, #d4af37 45%, #8a6a1c 100%);
    box-shadow:
      inset 0 -10px 30px rgba(0,0,0,0.45),
      inset 0 8px 16px rgba(255,255,255,0.4),
      0 12px 30px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.08s ease-out;
    position: relative;
  }
  .bead:active, .bead.tapped {
    transform: scale(0.94);
  }
  .bead-inner {
    color: #4a3a10;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 1px;
    text-shadow: 0 1px 2px rgba(255,255,255,0.4);
  }
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transform: scale(0);
    animation: ripple 0.6s ease-out;
    pointer-events: none;
  }
  @keyframes ripple {
    to { transform: scale(2.5); opacity: 0; }
  }

  /* Bottom controls */
  .controls {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 10px;
    padding: 14px 0 8px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn:active { transform: scale(0.97); }
  .btn-reset { background: rgba(220, 80, 80, 0.25); border-color: rgba(220, 80, 80, 0.4); }
  .btn-prev, .btn-next { background: rgba(212, 175, 55, 0.25); border-color: rgba(212, 175, 55, 0.4); }

  /* Modal for selecting name */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    padding: 20px;
    align-items: flex-end;
    justify-content: center;
  }
  .modal.show { display: flex; }
  .modal-content {
    background: linear-gradient(180deg, #1a4d44, #0c2e2a);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 75vh;
    overflow-y: auto;
    padding: 16px;
    border-top: 2px solid rgba(212, 175, 55, 0.5);
  }
  .modal-header {
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, #1a4d44 80%, transparent);
    padding: 4px 4px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1;
  }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 32px; height: 32px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
  }
  .name-list-item {
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 6px;
    transition: background 0.15s;
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .name-list-item:hover, .name-list-item.current { background: rgba(212, 175, 55, 0.18); }
  .name-list-num {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
  }
  .name-list-text { font-size: 14px; }
  .name-list-text small { display: block; opacity: 0.65; font-size: 11px; margin-top: 2px; }
  .name-list-arabic {
    font-size: 22px;
    color: #ffd95a;
    font-family: 'Traditional Arabic', 'Amiri', serif;
    direction: rtl;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 12px 22px;
    border-radius: 12px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Hide elements based on mode */
  body.mode-counter .name-card { display: none; }
  body.mode-counter .target-info { display: none; }
  body.mode-counter .target-settings { display: none; }
  body.mode-counter .btn-prev, body.mode-counter .btn-next { display: none; }
  @media (max-width: 360px) {
    .target-settings { grid-template-columns: 1fr 92px; }
    .target-mode { font-size: 12px; padding: 9px 4px; }
    .target-input { font-size: 16px; }
    .target-celebration-main { font-size: 34px; }
    .target-celebration-sub { font-size: 18px; }
  }
</style>

  nameIdx: 0,
  totalCounter: 0,
  targetMode: 'fixed',
  targetValue: DEFAULT_TARGET_PER_NAME,
};

// Load saved state
try {
  const saved = JSON.parse(localStorage.getItem('tasbih') || '{}');
  state = { ...state, ...saved };
} catch(e) {}

state.targetMode = state.targetMode === 'infinite' ? 'infinite' : 'fixed';
state.targetValue = normalizeTarget(state.targetValue);

const $ = id => document.getElementById(id);

function save() {
  try { localStorage.setItem('tasbih', JSON.stringify(state)); } catch(e) {}
}

function vibrate(ms) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 1800);
}

function showTargetCelebration(subText) {
  const box = $('targetCelebration');
  $('targetCelebrationMain').textContent = 'Alhamdulillah';
  $('targetCelebrationSub').textContent = subText;
  box.classList.remove('show');
  clearTimeout(box._h);
  requestAnimationFrame(() => box.classList.add('show'));
  box._h = setTimeout(() => box.classList.remove('show'), 2100);
}

function normalizeTarget(value) {
  const target = Number.parseInt(value, 10);
  if (Number.isNaN(target)) return DEFAULT_TARGET_PER_NAME;
  return Math.min(Math.max(target, 1), 9999);
}

function render() {
  document.body.className = 'mode-' + state.mode;
  document.querySelectorAll('.mode').forEach(el => {
    el.classList.toggle('active', el.dataset.mode === state.mode);
  });
  document.querySelectorAll('.target-mode').forEach(el => {
    el.classList.toggle('active', el.dataset.targetMode === state.targetMode);
  });
  $('targetInput').value = state.targetValue;
  $('targetInput').disabled = state.targetMode === 'infinite';

  if (state.mode === 'asmaul') {
    const [ar, tr, mn] = NAMES[state.nameIdx];
    $('nameArabic').textContent = ar;
    $('nameTranslit').textContent = tr;
    $('nameMeaning').textContent = mn;
    $('nameIndex').textContent = (state.nameIdx + 1) + ' / 99';
    $('counterDisplay').textContent = state.count;
    $('targetInfo').textContent = state.targetMode === 'infinite'
      ? `${state.count} kali - bebas ikut hati, tukar nama bila mahu`
      : `${state.count} / ${state.targetValue} - auto tukar nama bila cukup`;
  } else {
    $('counterDisplay').textContent = state.totalCounter;
  }
}

function tap(e) {
  // ripple
  const bead = $('bead');
  const rect = bead.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  const r = document.createElement('div');
  r.className = 'ripple';
  const size = 60;
  r.style.left = (x - size/2) + 'px';
  r.style.top = (y - size/2) + 'px';
  r.style.width = r.style.height = size + 'px';
  bead.appendChild(r);
  setTimeout(() => r.remove(), 600);

  vibrate(15);

  if (state.mode === 'asmaul') {
    state.count++;
    if (state.targetMode === 'fixed' && state.count >= state.targetValue) {
      // Move to next name
      if (state.nameIdx < NAMES.length - 1) {
        state.nameIdx++;
        state.count = 0;
        showTargetCelebration('Nama Allah seterusnya: ' + NAMES[state.nameIdx][1]);
        vibrate([30, 50, 30]);
      } else {
        showTargetCelebration('Selesai 99 nama Allah');
        vibrate([50, 50, 50, 50, 200]);
        state.count = state.targetValue;
      }
    }
  } else {
    state.totalCounter++;
  }
  save();
  render();
}

function reset() {
  if (state.mode === 'asmaul') {
    if (!confirm('Reset kiraan dan kembali ke nama pertama?')) return;
    state.count = 0;
    state.nameIdx = 0;
  } else {
    if (!confirm('Reset counter ke 0?')) return;
    state.totalCounter = 0;
  }
  save();
  render();
  showToast('Counter direset');
}

function nextName() {
  if (state.mode !== 'asmaul') return;
  state.nameIdx = (state.nameIdx + 1) % NAMES.length;
  state.count = 0;
  save();
  render();
}

function prevName() {
  if (state.mode !== 'asmaul') return;
  state.nameIdx = (state.nameIdx - 1 + NAMES.length) % NAMES.length;
  state.count = 0;
  save();
  render();
}

function buildNameList() {
  const list = $('nameList');
  list.innerHTML = '';
  NAMES.forEach(([ar, tr, mn], i) => {
    const el = document.createElement('div');
    el.className = 'name-list-item' + (i === state.nameIdx ? ' current' : '');
    el.innerHTML = `
      <div class="name-list-num">${i+1}</div>
      <div class="name-list-text"><strong>${tr}</strong><small>${mn}</small></div>
      <div class="name-list-arabic">${ar}</div>
    `;
    el.onclick = () => {
      state.nameIdx = i;
      state.count = 0;
      save();
      render();
      $('modal').classList.remove('show');
    };
    list.appendChild(el);
  });
}

// Event listeners
$('bead').addEventListener('click', tap);
$('resetBtn').addEventListener('click', reset);
$('nextBtn').addEventListener('click', nextName);
$('prevBtn').addEventListener('click', prevName);

$('menuBtn').addEventListener('click', () => {
  buildNameList();
  $('modal').classList.add('show');
  // scroll current into view
  setTimeout(() => {
    const cur = document.querySelector('.name-list-item.current');
    if (cur) cur.scrollIntoView({ block: 'center' });
  }, 50);
});
$('modalClose').addEventListener('click', () => $('modal').classList.remove('show'));
$('modal').addEventListener('click', e => {
  if (e.target === $('modal')) $('modal').classList.remove('show');
});

document.querySelectorAll('.mode').forEach(el => {
  el.addEventListener('click', () => {
    state.mode = el.dataset.mode;
    save();
    render();
  });
});

document.querySelectorAll('.target-mode').forEach(el => {
  el.addEventListener('click', () => {
    state.targetMode = el.dataset.targetMode;
    save();
    render();
    showToast(state.targetMode === 'infinite' ? 'Mode bebas diaktifkan' : 'Mode target diaktifkan');
  });
});

$('targetInput').addEventListener('change', e => {
  state.targetValue = normalizeTarget(e.target.value);
  state.targetMode = 'fixed';
  save();
  render();
});

// Volume key support disabled (browser limitation), but spacebar works
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    $('bead').click();
  } else if (e.code === 'ArrowRight') nextName();
  else if (e.code === 'ArrowLeft') prevName();
});

render();
</script>
</body>
</html>
